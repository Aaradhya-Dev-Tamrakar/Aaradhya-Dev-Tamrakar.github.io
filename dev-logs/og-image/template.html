<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400&display=swap');

  :root {
    --bg: #0f0e0c;
    --bg2: #161513;
    --text: #ede9e0;
    --muted: #9c9690;
    --accent: #d4a85a;
    --accent2: #6dbfaa;
    --heading: #f7f3eb;
    --line: rgba(255, 255, 255, 0.09);
    --serif: "Cormorant Garamond", Georgia, serif;
    --mono: "DM Mono", monospace;
    --sans: "Instrument Sans", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--sans);
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-columns: 1fr 420px;
    background: var(--bg);
  }

  /* Faint grid backdrop, matching hero-bg-lines pattern */
  .bg-lines {
    position: absolute;
    inset: -100px;
    background:
      linear-gradient(90deg, var(--line) 1px, transparent 1px),
      linear-gradient(0deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    -webkit-mask-image: radial-gradient(ellipse 120% 120% at 30% 40%, black 20%, transparent 72%);
    mask-image: radial-gradient(ellipse 120% 120% at 30% 40%, black 20%, transparent 72%);
  }

  .glow {
    position: absolute;
    top: -120px;
    right: 260px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,168,90,0.14) 0%, transparent 70%);
  }

  .left {
    position: relative;
    z-index: 2;
    padding: 0 0 0 84px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
  }

  .tag {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 26px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tag::before {
    content: "";
    display: block;
    width: 34px;
    height: 1px;
    background: var(--accent);
  }

  .name {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 64px;
    line-height: 1.08;
    color: var(--heading);
    letter-spacing: -0.01em;
  }

  .name .last {
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
    display: inline-block;
    position: relative;
  }

  .rule {
    width: 96px;
    height: 2px;
    background: var(--accent);
    margin: 22px 0 26px;
  }

  .role {
    font-family: var(--sans);
    font-size: 19px;
    line-height: 1.7;
    color: var(--text);
    max-width: 460px;
  }

  .role .line2 {
    display: block;
    margin-top: 2px;
  }

  .role .accent2 {
    color: var(--accent2);
  }

  .role .muted {
    color: var(--muted);
  }

  .domain {
    position: absolute;
    bottom: 56px;
    left: 84px;
    font-family: var(--mono);
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.02em;
    z-index: 2;
  }

  .right {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, #171512 0%, #0f0e0c 100%);
    border-left: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .portrait {
    width: 420px;
    height: 630px;
    object-fit: cover;
    object-position: 60% 15%;
    filter: grayscale(0.15) contrast(1.04);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 22%);
    mask-image: linear-gradient(90deg, transparent 0%, black 22%);
  }

  .corner-tl, .corner-br {
    position: absolute;
    width: 22px;
    height: 22px;
    z-index: 3;
  }
  .corner-tl { top: 40px; left: 40px; border-top: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); opacity: 0.55; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); opacity: 0.55; }
</style>
</head>
<body>
  <div class="card">
    <div class="bg-lines"></div>
    <div class="glow"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="left">
      <div class="tag">Portfolio</div>
      <div class="name">Aaradhya Dev<br /><span class="last">Tamrakar</span></div>
      <div class="rule"></div>
      <div class="role">
        BEI IV/I · KEC, IOE · Tribhuvan University
        <span class="line2"><span class="accent2">Fuse AI Fellow</span> <span class="muted">·</span> IEEE KEC Vice Chair</span>
      </div>
    </div>

    <div class="domain">aaradhya-dev-tamrakar.github.io</div>

    <div class="right">
      <img class="portrait" src="PORTRAIT_SRC" />
    </div>
  </div>
</body>
</html>
